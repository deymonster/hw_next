# файл docker-build.yml (фрагменты)
name: Build and Push Docker Images

on:
    push:
        tags:
            - 'hw-monitor-v*'
            - 'hw-monitor-licd-v*'
            - 'hw-monitor-nginx-combined-v*'
    workflow_dispatch:
        inputs:
            service:
                description: 'Сервис для сборки'
                required: true
                type: choice
                options:
                    - hw-monitor
                    - hw-monitor-licd
                    - hw-monitor-nginx-combined
            version:
                description: 'Версия (например: 1.0.0-alpha.8)'
                required: true
                type: string

jobs:
    code-quality:
        # Запускается на release, PR, workflow_run, вручную и на push (теги)
        if: >
            github.event_name == 'release' ||
            github.event_name == 'pull_request' ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  # При workflow_run нужно чекаутить правильную ветку
                  ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}

            - name: Setup Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: '20'
                  cache: 'yarn'

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Check code formatting
              run: |
                  echo "🔍 Проверяем форматирование кода..."
                  if ! yarn prettier --check .; then
                    echo "❌ ОШИБКА: Код не отформатирован правильно!"
                    echo "📝 Для исправления выполните локально:"
                    echo "   yarn format"
                    echo "   git add ."
                    echo "   git commit -m 'fix: format code'"
                    echo "   git push"
                    exit 1
                  else
                    echo "✅ Форматирование кода корректно"
                  fi

            - name: Type checking
              run: |
                  echo "🔍 Проверяем типы TypeScript..."
                  yarn tsc --noEmit

            - name: Linting
              run: |
                  echo "🔍 Проверяем код линтером..."
                  yarn lint

    build-and-push:
        runs-on: ubuntu-latest
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        needs: code-quality
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Login to DockerHub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Determine service, version and tags
              id: vars
              shell: bash
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    SERVICE="${{ github.event.inputs.service }}"
                    VERSION="${{ github.event.inputs.version }}"
                    TAG="${SERVICE}-v${VERSION}"
                  else
                    TAG="${GITHUB_REF_NAME}" # например: hw-monitor-v1.0.0-alpha
                    SERVICE="${TAG%%-v*}"    # hw-monitor | hw-monitor-licd | hw-monitor-nginx-combined
                    VERSION="${TAG#${SERVICE}-v}" # 1.0.0-alpha или 1.0.0
                  fi

                  if [[ -z "$SERVICE" || -z "$VERSION" ]]; then
                    echo "❌ Неверный формат входных данных: service='$SERVICE' version='$VERSION'"
                    exit 1
                  fi

                  ALIAS_TAG="latest"

                  case "$SERVICE" in
                    hw-monitor)
                      IMAGE="deymonster/hw-monitor"
                      DOCKERFILE="./Dockerfile"
                      CONTEXT="."
                      ;;
                    hw-monitor-licd)
                      IMAGE="deymonster/hw-monitor-licd"
                      DOCKERFILE="./licd/Dockerfile"
                      CONTEXT="./licd"
                      ;;
                    hw-monitor-nginx-combined)
                      IMAGE="deymonster/hw-monitor-nginx-combined"
                      DOCKERFILE="./Dockerfile.nginx-combined"
                      CONTEXT="."
                      ;;
                    *)
                      echo "❌ Unsupported service: $SERVICE"
                      exit 1
                      ;;
                  esac
                  echo "SERVICE=$SERVICE" >> $GITHUB_OUTPUT
                  echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
                  echo "COMMIT=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
                  echo "DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
                  echo "ALIAS_TAG=$ALIAS_TAG" >> $GITHUB_OUTPUT
                  echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT
                  echo "DOCKERFILE=$DOCKERFILE" >> $GITHUB_OUTPUT
                  echo "CONTEXT=$CONTEXT" >> $GITHUB_OUTPUT

            - name: Build and push selected service
              uses: docker/build-push-action@v4
              with:
                  context: ${{ steps.vars.outputs.CONTEXT }}
                  file: ${{ steps.vars.outputs.DOCKERFILE }}
                  push: true
                  tags: |
                      ${{ steps.vars.outputs.IMAGE }}:${{ steps.vars.outputs.ALIAS_TAG }}
                      ${{ steps.vars.outputs.IMAGE }}:v${{ steps.vars.outputs.VERSION }}
                  build-args: |
                      VERSION=${{ steps.vars.outputs.VERSION }}
                      COMMIT=${{ steps.vars.outputs.COMMIT }}
                      DATE=${{ steps.vars.outputs.DATE }}
                      ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Ensure hw-monitor-nginx-combined:latest points to newest tag
              if: ${{ steps.vars.outputs.SERVICE == 'hw-monitor' }}
              env:
                  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
                  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  REPO="deymonster/hw-monitor-nginx-combined"

                  if ! command -v jq >/dev/null 2>&1; then
                    sudo apt-get update -y
                    sudo apt-get install -y jq
                  fi

                  echo "Получаем самый свежий версионный тег для $REPO..."
                  LATEST_VERSION_TAG="$(curl -s -u "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" "https://hub.docker.com/v2/repositories/${REPO}/tags/?page_size=100" \
                    | jq -r '.results | map(select(.name | test("^v"))) | sort_by(.last_updated) | last | .name')"

                  if [[ -z "$LATEST_VERSION_TAG" || "$LATEST_VERSION_TAG" == "null" ]]; then
                    echo "Не найдено версионных тегов для $REPO — пропускаем."
                    exit 0
                  fi

                  echo "Обновляю ${REPO}:latest → ${LATEST_VERSION_TAG}"
                  docker buildx imagetools create -t "${REPO}:latest" "${REPO}:${LATEST_VERSION_TAG}"
                  echo "Готово."

            - name: Ensure hw-monitor-licd:latest points to newest tag
              if: ${{ steps.vars.outputs.SERVICE == 'hw-monitor' }}
              env:
                  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
                  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  REPO="deymonster/hw-monitor-licd"

                  if ! command -v jq >/dev/null 2>&1; then
                    sudo apt-get update -y
                    sudo apt-get install -y jq
                  fi

                  echo "Получаем самый свежий версионный тег для $REPO..."
                  LATEST_VERSION_TAG="$(curl -s -u "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" "https://hub.docker.com/v2/repositories/${REPO}/tags/?page_size=100" \
                    | jq -r '.results | map(select(.name | test("^v"))) | sort_by(.last_updated) | last | .name')"

                  if [[ -z "$LATEST_VERSION_TAG" || "$LATEST_VERSION_TAG" == "null" ]]; then
                    echo "Не найдено версионных тегов для $REPO — пропускаем."
                    exit 0
                  fi

                  echo "Обновляю ${REPO}:latest → ${LATEST_VERSION_TAG}"
                  docker buildx imagetools create -t "${REPO}:latest" "${REPO}:${LATEST_VERSION_TAG}"
                  echo "Готово."

            - name: Update docker-compose.prod.yml image tags
              if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
              run: |
                  set -euo pipefail
                  SERVICE="${{ steps.vars.outputs.SERVICE }}"
                  VERSION="${{ steps.vars.outputs.VERSION }}"

                  echo "Патчим docker-compose.prod.yml для $SERVICE → v${VERSION}"

                  case "$SERVICE" in
                    hw-monitor)
                      sed -E -i 's|(image:\s*deymonster/hw-monitor:)[^ #]+|\1v'"$VERSION"'|g' docker-compose.prod.yml
                      ;;
                    hw-monitor-licd)
                      sed -E -i 's|(image:\s*deymonster/hw-monitor-licd:)[^ #]+|\1v'"$VERSION"'|g' docker-compose.prod.yml
                      ;;
                    hw-monitor-nginx-combined)
                      sed -E -i 's|(image:\s*deymonster/hw-monitor-nginx-combined:)[^ #]+|\1v'"$VERSION"'|g' docker-compose.prod.yml
                      ;;
                  esac

                  echo "Итоговые строки:"
                  grep -nE 'image:\s*deymonster/(hw-monitor|hw-monitor-licd|hw-monitor-nginx-combined):' docker-compose.prod.yml || true

            - name: Setup Go
              if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
              uses: actions/setup-go@v5
              with:
                  go-version: '1.22'

            - name: Upload deploy files to Nextcloud
              if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
              env:
                  NEXTCLOUD_PASSWORD: ${{ secrets.NEXTCLOUD }}
              run: |
                  set -euo pipefail
                  echo "Заливаем файлы в Nextcloud..."

                  if [[ -z "${NEXTCLOUD_PASSWORD}" ]]; then
                    echo "❌ NEXTCLOUD секрет не задан или пуст (Repository secrets → NEXTCLOUD)"
                    exit 1
                  fi

                  BASE="https://storage.deymonster.ru/remote.php/dav/files/admin/hw"
                  AUTH="admin:${NEXTCLOUD_PASSWORD}"

                  # Build hw-agent
                  echo "Собираем hw-agent..."
                  cd cmd/hw-agent
                  GOOS=linux GOARCH=amd64 go build -o ../../scripts/hw-agent main.go
                  cd ../..

                  test -f docker-compose.prod.yml || { echo "Файл docker-compose.prod.yml отсутствует"; exit 1; }
                  test -f scripts/install_v2.sh || { echo "Файл scripts/install_v2.sh отсутствует"; exit 1; }
                  test -f scripts/hwctl.sh || { echo "Файл scripts/hwctl.sh отсутствует"; exit 1; }
                  test -f scripts/cleanup.sh || { echo "Файл scripts/cleanup.sh отсутствует"; exit 1; }
                  test -f scripts/hw-agent || { echo "Файл scripts/hw-agent отсутствует"; exit 1; }

                  curl -f -s -u "$AUTH" -X PUT "$BASE/deploys/docker-compose/docker-compose.prod.yml" \
                       --data-binary @docker-compose.prod.yml \
                       -w "docker-compose.prod.yml → %{http_code}\n" -o /dev/null

                  curl -f -s -u "$AUTH" -X PUT "$BASE/deploys/scripts/install_v2.sh" \
                       --data-binary @scripts/install_v2.sh \
                       -w "install_v2.sh → %{http_code}\n" -o /dev/null

                  curl -f -s -u "$AUTH" -X PUT "$BASE/deploys/scripts/hwctl.sh" \
                       --data-binary @scripts/hwctl.sh \
                       -w "hwctl.sh → %{http_code}\n" -o /dev/null

                  curl -f -s -u "$AUTH" -X PUT "$BASE/deploys/scripts/cleanup.sh" \
                       --data-binary @scripts/cleanup.sh \
                       -w "cleanup.sh → %{http_code}\n" -o /dev/null

                  curl -f -s -u "$AUTH" -X PUT "$BASE/deploys/scripts/hw-agent" \
                       --data-binary @scripts/hw-agent \
                       -w "hw-agent → %{http_code}\n" -o /dev/null

                  echo ""
                  echo "Проверить можно здесь:"
                  echo "• https://storage.deymonster.ru/apps/files/?dir=/hw/deploys/docker-compose"
                  echo "• https://storage.deymonster.ru/apps/files/?dir=/hw/deploys/scripts"
